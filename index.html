.b-analise{background:var(--suave);border-left:4px solid var(--azul);border-radius:0 9px 9px 0;padding:14px 18px;font-size:12.5px;color:#2D3748;line-height:1.7;margin-bottom:12px}
.b-analise strong{color:var(--marinho);font-weight:700}
.b-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:11px}
.b-card{background:#fff;border-radius:var(--r);padding:15px 14px;box-shadow:var(--sombra);border:1px solid var(--borda);position:relative;overflow:hidden}
.b-card.dk{background:linear-gradient(135deg,var(--marinho),#0C1460);border-color:transparent}
.b-card.dk .bcl{color:rgba(255,255,255,.55)}.b-card.dk .bcv{color:var(--claro)}
.b-card.gr{border-left:4px solid var(--verde)}.b-card.am{border-left:4px solid var(--amber)}.b-card.rd{border-left:4px solid var(--vermelho)}.b-card.vi{border-left:4px solid var(--violeta)}
.b-card .bcl{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--cinza);margin-bottom:5px}
.b-card .bcv{font-family:'Sora';font-size:clamp(14px,1.8vw,19px);font-weight:700;color:var(--marinho);line-height:1.1}
.b-card .bcicon{position:absolute;top:11px;right:11px;width:26px;height:26px;border-radius:7px;background:rgba(10,100,255,.07);display:flex;align-items:center;justify-content:center;font-size:13px}
.b-cg{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:13px}
.b-cc{background:#fff;border-radius:var(--r);padding:17px 16px;box-shadow:var(--sombra);border:1px solid var(--borda);overflow:hidden}
.b-cc.full{grid-column:1/-1}
.bct{font-family:'Sora';font-size:12.5px;font-weight:600;margin-bottom:3px}
.bcd{font-size:10px;color:var(--cinza);margin-bottom:12px}
.bcw{position:relative;height:215px;width:100%}
.b-cias-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.b-cias-box{background:#fff;border-radius:var(--r);padding:17px 16px;box-shadow:var(--sombra);border:1px solid var(--borda)}
.cia-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--suave)}
.cia-row:last-child{border-bottom:none}
.cia-rk{font-size:10px;font-weight:700;color:var(--azul);width:18px}
.cia-nm{flex:1;font-weight:500;font-size:11.5px}
.cia-bw{width:54px}.cia-b{height:5px;background:var(--suave);border-radius:3px;overflow:hidden}
.cia-bf{height:100%;background:linear-gradient(to right,var(--azul),var(--claro));border-radius:3px}
.cia-vl{font-weight:700;font-size:11px;color:var(--marinho);white-space:nowrap}
.b-acao-item{background:#fff;border-radius:9px;padding:12px 15px;box-shadow:0 2px 8px rgba(5,10,52,.07);border:1px solid var(--borda);margin-bottom:9px}
.b-acao-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;gap:10px}
.b-acao-title{font-weight:600;font-size:13px}
.b-acao-meta{font-size:11px;color:var(--cinza)}
.b-passos{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:9px}
.b-passo{background:#fff;border-radius:9px;padding:12px 14px;box-shadow:0 2px 8px rgba(5,10,52,.07);border:1px solid var(--borda);display:flex;align-items:flex-start;gap:10px;font-size:12px;color:#374151;line-height:1.5}
.b-pn{width:23px;height:23px;border-radius:6px;background:linear-gradient(135deg,var(--azul),var(--violeta));color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.analise-gerencial{background:linear-gradient(135deg,#F8FAFF,var(--suave));border:1px solid var(--borda);border-radius:var(--r);padding:20px}
.ag-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}
.ag-item{background:#fff;border-radius:9px;padding:13px 15px;border:1px solid var(--borda)}
.ag-item-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--azul);margin-bottom:5px}
.ag-item-txt{font-size:12px;color:#374151;line-height:1.55}
.ag-item-txt strong{color:var(--marinho);font-weight:700}
.b-footer{background:var(--marinho);color:rgba(255,255,255,.45);text-align:center;padding:16px;border-radius:var(--r);margin-top:24px;font-size:11px}
.b-footer strong{color:var(--claro);font-weight:600}
.avoid{page-break-inside:avoid!important;break-inside:avoid!important}
 
/* ============================================================ EDIÇÃO (dinâmica) */
.edit-tabs{display:flex;gap:7px;margin-bottom:14px;border-bottom:2px solid var(--borda);padding-bottom:0}
.edit-tab{background:transparent;border:none;color:var(--cinza);padding:9px 16px;cursor:pointer;font-size:12.5px;font-weight:600;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.16s;border-radius:9px 9px 0 0}
.edit-tab:hover{background:var(--gelo);color:var(--azul)}
.edit-tab.active{color:var(--azul);border-bottom-color:var(--azul);background:var(--gelo)}
.edit-actionbar{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--borda);border-radius:12px;padding:11px 16px;margin-bottom:14px;box-shadow:var(--sh)}
.edit-counter{font-size:12px;font-weight:600;color:var(--cinza)}
.edit-cards{display:flex;flex-direction:column;gap:10px;max-height:560px;overflow-y:auto;padding:2px}
.edit-card{background:var(--card);border:1px solid var(--borda);border-radius:13px;padding:13px 15px;box-shadow:var(--sh);transition:.16s}
.edit-card:hover{border-color:var(--ceu);box-shadow:var(--sh2)}
.ec-grid{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap}
.ec-field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:90px}
.ec-field.ec-wide{flex:2;min-width:150px}
.ec-field label{font-size:9.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--cinza2)}
.ec-field input,.ec-field select{border:1.5px solid var(--borda);border-radius:9px;padding:8px 11px;font-family:inherit;font-size:12.5px;font-weight:500;color:var(--marinho);background:#fff;outline:none;transition:.16s;width:100%}
.ec-field input:focus,.ec-field select:focus{border-color:var(--azul);box-shadow:0 0 0 3px rgba(10,100,255,.12)}
.ec-del{background:#FEF2F2;border:1.5px solid #FECACA;color:var(--vermelho);width:38px;height:38px;border-radius:9px;cursor:pointer;font-size:14px;flex-shrink:0;transition:.16s}
.ec-del:hover{background:var(--vermelho);color:#fff;border-color:var(--vermelho)}
 
/* ---- Painel de colagem do Excel ---- */
.paste-panel{background:var(--card);border:1px solid var(--borda);border-radius:14px;padding:18px;box-shadow:var(--sh);margin-bottom:18px}
.paste-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:10px}
.paste-title{font-family:'Sora';font-size:15px;font-weight:700;color:var(--marinho)}
.paste-sub{font-size:11.5px;color:var(--cinza);margin-top:3px;max-width:680px;line-height:1.5}
.paste-cols{font-size:11px;color:var(--cinza);background:var(--gelo);border:1px solid #DCE7FF;border-radius:8px;padding:8px 11px;margin-bottom:11px;line-height:1.5}
.paste-cols b{color:var(--azul)}
.paste-area{width:100%;min-height:170px;border:1.5px solid var(--borda);border-radius:10px;padding:12px;font-family:'Courier New',ui-monospace,monospace;font-size:12px;line-height:1.5;color:var(--marinho);background:#FBFCFF;outline:none;resize:vertical;white-space:pre;overflow:auto;transition:.16s}
.paste-area:focus{border-color:var(--azul);box-shadow:0 0 0 3px rgba(10,100,255,.12)}
.paste-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:12px}
.paste-mode{margin-left:auto;display:flex;align-items:center}
.paste-preview{margin-top:14px}
.paste-preview:empty{margin-top:0}
.paste-ok{background:#D1FAE5;color:#047857;border:1px solid #A7F3D0;border-radius:8px;padding:9px 12px;font-size:12px;font-weight:600;margin-bottom:11px}
.paste-ok code,.paste-err code{background:rgba(0,0,0,.06);padding:1px 6px;border-radius:5px;font-size:11px}
.paste-err{background:#FEE2E2;color:#B91C1C;border:1px solid #FECACA;border-radius:8px;padding:10px 13px;font-size:12.5px;font-weight:600;line-height:1.6}
.paste-err code{background:rgba(185,28,28,.08)}
.paste-tblwrap{max-height:280px;overflow:auto;border:1px solid var(--borda);border-radius:10px}
.paste-tbl{font-size:11.5px}
.paste-tbl th{position:sticky;top:0;background:var(--gelo);z-index:1}
.paste-more{font-size:11px;color:var(--cinza2);margin-top:8px;font-style:italic}
.edit-divider{display:flex;align-items:center;gap:12px;margin:6px 0 16px;color:var(--cinza2);font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase}
.edit-divider::before,.edit-divider::after{content:"";flex:1;height:1px;background:var(--borda)}
</style>
</head>

const fmt=v=>"R$ "+Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtM=v=>{v=Number(v)||0;if(Math.abs(v)>=1e6)return"R$ "+(v/1e6).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})+" mi";if(Math.abs(v)>=1e3)return"R$ "+(v/1e3).toLocaleString("pt-BR",{minimumFractionDigits:1,maximumFractionDigits:1})+" mil";return fmt(v);};
const fmtP=v=>Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})+"%";
const fmtN=v=>Number(v||0).toLocaleString("pt-BR");

const CHARTS={};
function mkChart(id,cfg){if(CHARTS[id]){CHARTS[id].destroy();delete CHARTS[id];}const el=document.getElementById(id);if(!el)return;CHARTS[id]=new Chart(el,cfg);return CHARTS[id];}

/* MOTOR DE FILTROS GLOBAIS — multisseleção */
const FILTROS={ano:[],mes:[],cia:[],motivo:[],status:[]};
const FILTRO_LABELS={ano:"Ano",mes:"Mês",cia:"CIA",motivo:"Motivo",status:"Status"};
 
function aplicarFato(){
  return DR.fato.filter(r=>
    (!FILTROS.ano.length    || FILTROS.ano.includes(String(r.ano))) &&
    (!FILTROS.mes.length    || FILTROS.mes.includes(r.mes)) &&
    (!FILTROS.cia.length    || FILTROS.cia.includes(r.cia)) &&
    (!FILTROS.motivo.length || FILTROS.motivo.includes(r.motivo)) &&
    (!FILTROS.status.length || FILTROS.status.includes(r.status))
  );
}
function agrupar(rows,campo){
  const m={};rows.forEach(r=>{m[r[campo]]=(m[r[campo]]||0)+r.valor;});
  return Object.entries(m).filter(([,v])=>v!==0).sort((a,b)=>b[1]-a[1]);
}
 
function opcoesDe(campo){
  if(campo==="ano") return [...new Set(DR.fato.map(r=>String(r.ano)))].sort((a,b)=>b-a);
  if(campo==="mes") return MESES.filter(m=>DR.fato.some(r=>r.mes===m)).concat(DR.fato.some(r=>r.mes==="—")?["—"]:[]);
  return [...new Set(DR.fato.map(r=>r[campo]))].filter(Boolean).sort();
}
 
function popularFiltros(){
  ["ano","mes","cia","motivo","status"].forEach(campo=>{
    FILTROS[campo]=FILTROS[campo].filter(v=>opcoesDe(campo).includes(v));
    montarDropdown(campo);
  });
}
function montarDropdown(campo){
  const opts=opcoesDe(campo);
  const sel=FILTROS[campo];
  const menu=document.getElementById("ms-menu-"+campo);
  if(menu){
    menu.innerHTML=
      `<label class="ms-opt ms-all"><input type="checkbox" ${sel.length===0?"checked":""} onchange="msToggleAll('${campo}')"> <span>Todos</span></label>`+
      opts.map(o=>`<label class="ms-opt"><input type="checkbox" value="${o}" ${sel.includes(o)?"checked":""} onchange="msToggle('${campo}','${String(o).replace(/'/g,"\\'")}')"> <span>${o}</span></label>`).join("");
  }
  atualizarBotaoFiltro(campo);
}
function atualizarBotaoFiltro(campo){
  const btn=document.getElementById("ms-btn-"+campo);if(!btn)return;
  const sel=FILTROS[campo];
  const padrao={ano:"Todos os anos",mes:"Todos os meses",cia:"Todas as CIAs",motivo:"Todos os motivos",status:"Todos os status"}[campo];
  let txt;
  if(sel.length===0) txt=padrao;
  else if(sel.length===1) txt=sel[0];
  else txt=sel.length+" selecionados";
  btn.querySelector(".ms-btn-txt").textContent=txt;
  btn.classList.toggle("ms-active",sel.length>0);
}
function msToggle(campo,valor){
  const i=FILTROS[campo].indexOf(valor);
  if(i>=0) FILTROS[campo].splice(i,1); else FILTROS[campo].push(valor);
  montarDropdown(campo);renderChips();renderAtual();
}
function msToggleAll(campo){
  FILTROS[campo]=[];
  montarDropdown(campo);renderChips();renderAtual();
}
function msOpen(campo,btn){
  const dd=document.getElementById("ms-"+campo);
  const aberto=dd.classList.contains("open");
  document.querySelectorAll(".ms-dd.open").forEach(d=>d.classList.remove("open"));
  if(!aberto) dd.classList.add("open");
}
function setFiltro(campo,valor){
  valor=String(valor);
  const i=FILTROS[campo].indexOf(valor);
  if(i>=0) FILTROS[campo].splice(i,1); else FILTROS[campo].push(valor);
  montarDropdown(campo);renderChips();renderAtual();
}
function limparFiltros(){
  Object.keys(FILTROS).forEach(k=>FILTROS[k]=[]);
  popularFiltros();renderChips();renderAtual();
}
function renderChips(){
  const box=document.getElementById("fb-active");
  const chips=[];
  Object.entries(FILTROS).forEach(([campo,vals])=>{
    vals.forEach(v=>chips.push(`<span class="chip">${FILTRO_LABELS[campo]}: ${v}<button onclick="setFiltro('${campo}','${String(v).replace(/'/g,"\\'")}')">✕</button></span>`));
  });
  box.innerHTML=chips.join("");
}

function panelOpen(titulo,hint,cls){return `<div class="panel"><div class="panel-h"><h3><span class="bar"></span>${titulo}</h3>${hint?`<span class="hint">${hint}</span>`:''}</div><div class="${cls||''}">`;}
function panelClose(){return `</div></div>`;}
function vazio(msg){return `<div class="empty"><div class="ic">🔍</div>${msg||'Sem dados para os filtros selecionados.'}</div>`;}
 
/* VIEW 1 — GERENCIAL */
function renderGerencial(){
  const rows=aplicarFato();
  const total=rows.reduce((s,r)=>s+r.valor,0);
  const anoMax=Math.max(...DR.fato.map(r=>r.ano));
  const cauda=rows.filter(r=>r.ano<anoMax).reduce((s,r)=>s+r.valor,0);
  const nova=rows.filter(r=>r.ano===anoMax).reduce((s,r)=>s+r.valor,0);
  const credito=DR.creditoTotal||0;
  const emDia=DR.emDiaTotal||0;
  const devolucao=rows.filter(r=>r.motivo==="Devolução").reduce((s,r)=>s+r.valor,0);
 
  let html=`<div class="kpi-row">
    ${kpi("Valor Total",fmtM(total),null,"dk")}
    ${kpi("Cauda Histórica",fmtM(cauda),null,"")}
    ${kpi("Inadimplência Nova",fmtM(nova),null,"rd")}
    ${kpi("Em Dia",fmtM(emDia),null,"gr")}
    ${kpi("Crédito",fmtM(credito),null,"am")}
    ${kpi("Em Devolução",fmtM(devolucao),null,"vi")}
  </div>`;
 
  if(!rows.length){document.getElementById("content").innerHTML=`<div class="view on">${html}${vazio()}</div>`;return;}
 
  html+=`<div class="grid g2">
    ${panelOpen("Valor por CIA","clique p/ filtrar","chart-box")}<canvas id="c-cia"></canvas>${panelClose()}
    ${panelOpen("Valor por Motivo","clique p/ filtrar","chart-box")}<canvas id="c-motivo"></canvas>${panelClose()}
  </div>
  <div class="grid g2">
    ${panelOpen("Valor por Ano","","chart-box")}<canvas id="c-ano"></canvas>${panelClose()}
    ${panelOpen("Evolução mensal","valor por mês ao longo do tempo","chart-box")}<canvas id="c-mensal"></canvas>${panelClose()}
  </div>
  <div class="grid">
    ${panelOpen("Histórico anual — Faturamento × Inadimplência","série completa 2018–2026","chart-box lg")}<canvas id="c-hist"></canvas>${panelClose()}
  </div>`;
  document.getElementById("content").innerHTML=`<div class="view on">${html}</div>`;
 
  const byCia=agrupar(rows,"cia"),byMot=agrupar(rows,"motivo"),byAno=agrupar(rows,"ano");
  const barOpts=(onClickArr,campo)=>({indexAxis:"y",responsive:true,maintainAspectRatio:false,
    onClick:(e,el)=>{if(el.length)setFiltro(campo,onClickArr[el[0].index][0]);},
    plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${fmt(c.raw)} (${fmtP(total?c.raw/total*100:0)})`}}},
    scales:{x:{ticks:{callback:v=>fmtM(v)},grid:{color:"rgba(0,0,0,.04)"}},y:{grid:{display:false}}}});
 
  mkChart("c-cia",{type:"bar",data:{labels:byCia.map(x=>x[0]),datasets:[{data:byCia.map(x=>x[1]),backgroundColor:byCia.map((_,i)=>COR[i%COR.length]),borderRadius:5}]},options:barOpts(byCia,"cia")});
  mkChart("c-motivo",{type:"bar",data:{labels:byMot.map(x=>x[0]),datasets:[{data:byMot.map(x=>x[1]),backgroundColor:byMot.map((_,i)=>COR[i%COR.length]),borderRadius:5}]},options:barOpts(byMot,"motivo")});
  mkChart("c-ano",{type:"bar",data:{labels:byAno.map(x=>x[0]).sort(),datasets:[{data:byAno.sort((a,b)=>a[0]-b[0]).map(x=>x[1]),backgroundColor:byAno.map((_,i)=>i>=byAno.length-2?"#0A64FF":"rgba(10,100,255,.32)"),borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,onClick:(e,el)=>{if(el.length)setFiltro("ano",byAno.sort((a,b)=>a[0]-b[0])[el[0].index][0]);},plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmt(c.raw)}}},scales:{x:{grid:{display:false}},y:{ticks:{callback:v=>fmtM(v)},grid:{color:"rgba(0,0,0,.04)"}}}}});
  const ordMes=m=>{const i=MESES.indexOf(m);return i<0?12:i;};
  const mensalMap={};
  rows.forEach(r=>{const k=r.ano+"|"+r.mes;mensalMap[k]=(mensalMap[k]||0)+r.valor;});
  const mensal=Object.entries(mensalMap).map(([k,v])=>{const[a,m]=k.split("|");return{ano:+a,mes:m,valor:v};})
    .sort((x,y)=>x.ano-y.ano||ordMes(x.mes)-ordMes(y.mes));
  mkChart("c-mensal",{type:"line",data:{labels:mensal.map(p=>p.mes==="—"?String(p.ano):`${p.mes}/${String(p.ano).slice(2)}`),datasets:[{label:"Valor",data:mensal.map(p=>p.valor),borderColor:"#0A64FF",backgroundColor:"rgba(10,100,255,.10)",fill:true,tension:.32,pointRadius:2.5,borderWidth:2.5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmt(c.raw)}}},scales:{x:{grid:{display:false},ticks:{maxRotation:60,minRotation:0,autoSkip:true,maxTicksLimit:14}},y:{ticks:{callback:v=>fmtM(v)},grid:{color:"rgba(0,0,0,.04)"}}}}});
 
  const h=DR.historico;
  mkChart("c-hist",{data:{labels:h.map(x=>x.ano),datasets:[
    {type:"bar",label:"Faturamento",data:h.map(x=>x.faturamento),backgroundColor:"rgba(10,100,255,.22)",borderRadius:5,yAxisID:"y"},
    {type:"line",label:"% Inadimplência",data:h.map(x=>x.perc),borderColor:"#EF4444",backgroundColor:"#EF4444",borderWidth:2.5,tension:.35,yAxisID:"y2",pointRadius:3}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{boxWidth:12,padding:12}},tooltip:{callbacks:{label:c=>c.dataset.yAxisID==="y2"?`${c.dataset.label}: ${fmtP(c.raw)}`:`${c.dataset.label}: ${fmtM(c.raw)}`}}},scales:{y:{ticks:{callback:v=>fmtM(v)},grid:{color:"rgba(0,0,0,.04)"}},y2:{position:"right",ticks:{callback:v=>v+"%"},grid:{display:false}},x:{grid:{display:false}}}}});
}

/* VIEW 3 — CRÉDITOS & CONCILIAÇÃO */
function renderCredito(){
  const totalCred=DR.creditoCia.reduce((s,c)=>s+c.valor,0);
  const conc=DR.conciliacao;
  const diasMedio=Math.round(conc.reduce((s,c)=>s+c.dias,0)/conc.length);
 
  let html=`<div class="kpi-row">
    ${kpi("Crédito líquido total",fmtM(DR.creditoTotal),null,"am")}
    ${kpi("Maior crédito (CIA)",DR.creditoCia[0]?.cia||"—",null,"dk")}
    ${kpi("Dias médios de conciliação",diasMedio+" dias","média geral","")}
    ${kpi("CIAs em conciliação",fmtN(conc.length),"base de faturamento","gr")}
  </div>
  <div class="grid g2">
    ${panelOpen("Crédito líquido por CIA","Crédito − Estorno • valor cheio","chart-box")}<canvas id="c-cred"></canvas>${panelClose()}
    ${panelOpen("Dias médios de baixa por CIA","conciliação financeira","chart-box")}<canvas id="c-dias"></canvas>${panelClose()}
  </div>
  ${panelOpen("Conciliação por CIA — faturamento e prazo","")}
    <table class="tbl"><thead><tr><th>CIA</th><th class="num">Faturamento</th><th class="num">Dias médios</th><th style="width:140px">Prazo</th></tr></thead><tbody>
    ${conc.map(c=>{const w=Math.min(100,c.dias/40*100);return `<tr><td><strong>${c.cia}</strong></td><td class="num">${fmtM(c.faturamento)}</td><td class="num">${c.dias}</td><td><div class="mini-bar"><div style="width:${w}%;background:${c.dias>35?'linear-gradient(90deg,#F59E0B,#EF4444)':'linear-gradient(90deg,#0A64FF,#73C6FF)'}"></div></div></td></tr>`;}).join("")}
    </tbody></table>
  ${panelClose()}`;
  document.getElementById("content").innerHTML=`<div class="view on">${html}</div>`;
 
  const cc=[...DR.creditoCia].sort((a,b)=>b.valor-a.valor);
  mkChart("c-cred",{type:"bar",data:{labels:cc.map(c=>c.cia),datasets:[{data:cc.map(c=>c.valor),backgroundColor:cc.map((c,i)=>c.valor<0?"#EF4444":COR[i%COR.length]),borderRadius:5}]},options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.raw<0?`${fmt(c.raw)} (estorno > crédito)`:`${fmt(c.raw)} (${fmtP(totalCred?c.raw/totalCred*100:0)})`}}},scales:{x:{ticks:{callback:v=>fmtM(v)},grid:{color:"rgba(0,0,0,.04)"}},y:{grid:{display:false}}}}});
  const cd=[...conc].sort((a,b)=>b.dias-a.dias);
  mkChart("c-dias",{type:"bar",data:{labels:cd.map(c=>c.cia),datasets:[{data:cd.map(c=>c.dias),backgroundColor:cd.map(c=>c.dias>35?"#F59E0B":"#0A64FF"),borderRadius:5}]},options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.raw+" dias"}}},scales:{x:{grid:{color:"rgba(0,0,0,.04)"}},y:{grid:{display:false}}}}});
}

/* ====== COLAGEM DO EXCEL → tabela-fato ======
   Lê texto colado (TSV do Excel, ou CSV com ; ou ,), usa a 1ª linha como
   cabeçalho, mapeia sinônimos de coluna, valida obrigatórias e converte
   em array JSON. Atualiza KPIs/gráficos/tabelas e salva no localStorage. */
const COL_OBRIGATORIAS=["cia","valor"];
const COL_SINONIMOS={
  ano:["ano","year","exercicio","exercício","competencia ano"],
  mes:["mes","mês","month","competencia","competência","mes ref","mês ref"],
  cia:["cia","companhia","seguradora","empresa","cliente","cia.","companhia seguradora"],
  motivo:["motivo","causa","tipo","categoria","razao","razão"],
  setor:["setor","area","área","departamento","depto"],
  status:["status","situacao","situação","estado"],
  valor:["valor","valor r$","valor (r$)","value","montante","total","saldo","r$","vlr"],
};
function normTxt(s){return String(s||"").trim().toLowerCase()
  .normalize("NFD").replace(/[\u0300-\u036f]/g,"");}
function detectarSeparador(linha){
  if(linha.includes("\t"))return "\t";
  // se tem ; e (nenhuma vírgula OU mais ; que ,) → ;
  const v=(linha.match(/,/g)||[]).length, pv=(linha.match(/;/g)||[]).length;
  if(pv>0 && pv>=v)return ";";
  if(v>0)return ",";
  return "\t";
}
function parseValorBR(s){
  s=String(s==null?"":s).trim().replace(/r\$\s*/i,"").replace(/\s/g,"");
  if(!s)return 0;
  // formato BR: milhar com . e decimal com ,  → remove . e troca , por .
  if(/,\d{1,2}$/.test(s)) s=s.replace(/\./g,"").replace(",",".");
  else s=s.replace(/,/g,"");            // formato US/simples
  const n=parseFloat(s);
  return isNaN(n)?0:n;
}
function parseMes(s){
  s=normTxt(s);
  const map={jan:"Jan","janeiro":"Jan",fev:"Fev","fevereiro":"Fev",mar:"Mar","marco":"Mar","março":"Mar",
    abr:"Abr","abril":"Abr",mai:"Mai","maio":"Mai",jun:"Jun","junho":"Jun",jul:"Jul","julho":"Jul",
    ago:"Ago","agosto":"Ago",set:"Set","setembro":"Set",out:"Out","outubro":"Out",
    nov:"Nov","novembro":"Nov",dez:"Dez","dezembro":"Dez"};
  if(!s||s==="-"||s==="—")return "—";
  if(map[s])return map[s];
  const m3=s.slice(0,3); if(map[m3])return map[m3];
  const num=parseInt(s,10); if(num>=1&&num<=12)return MESES[num-1];
  return "—";
}
function mapearCabecalho(headers){
  // retorna {indiceColuna: campoInterno}
  const mapa={};
  headers.forEach((h,idx)=>{
    const hn=normTxt(h);
    for(const [campo,sins] of Object.entries(COL_SINONIMOS)){
      if(sins.some(s=>normTxt(s)===hn)){mapa[idx]=campo;break;}
    }
  });
  return mapa;
}
function analisarColagem(){
  const txt=document.getElementById("paste-area").value;
  const prev=document.getElementById("paste-preview");
  if(!txt||!txt.trim()){prev.innerHTML=msgErro("Cole algum conteúdo antes de analisar.");toast("Nada para analisar","⚠️");return;}
  // separa linhas (ignora linhas totalmente vazias)
  let linhas=txt.replace(/\r/g,"").split("\n").filter(l=>l.trim().length);
  if(linhas.length<2){prev.innerHTML=msgErro("São necessárias ao menos 2 linhas: cabeçalho + 1 registro.");toast("Dados insuficientes","⚠️");return;}
  const sep=detectarSeparador(linhas[0]);
  const headers=linhas[0].split(sep).map(s=>s.trim());
  const mapa=mapearCabecalho(headers);
  const camposEncontrados=Object.values(mapa);
  // valida obrigatórias
  const faltando=COL_OBRIGATORIAS.filter(c=>!camposEncontrados.includes(c));
  if(faltando.length){
    prev.innerHTML=msgErro(`Coluna(s) obrigatória(s) não encontrada(s): <b>${faltando.join(", ")}</b>.<br>Cabeçalho lido: <code>${headers.join(" | ")}</code>`);
    toast("Faltam colunas obrigatórias","❌");return;
  }
  // converte registros
  const registros=[]; let descartadas=0;
  for(let i=1;i<linhas.length;i++){
    const cels=linhas[i].split(sep);
    const o={ano:"",mes:"—",cia:"",motivo:"",setor:"",status:"Em aberto",valor:0};
    Object.entries(mapa).forEach(([idx,campo])=>{
      const raw=(cels[idx]!=null?cels[idx]:"").trim();
      if(campo==="ano") o.ano=parseInt(raw,10)||"";
      else if(campo==="valor") o.valor=parseValorBR(raw);
      else if(campo==="mes") o.mes=parseMes(raw);
      else o[campo]=raw;
    });
    if(!o.cia && !o.valor){descartadas++;continue;}   // linha vazia/irrelevante
    if(!o.ano) o.ano=new Date().getFullYear();
    registros.push(o);
  }
  if(!registros.length){prev.innerHTML=msgErro("Nenhum registro válido encontrado após a conversão.");toast("Sem registros válidos","❌");return;}
  // pré-visualização
  const colsShow=["ano","mes","cia","motivo","setor","status","valor"];
  const amostra=registros.slice(0,8);
  prev.innerHTML=`
    <div class="paste-ok">✅ <b>${registros.length}</b> registro(s) reconhecido(s)${descartadas?` • ${descartadas} linha(s) ignorada(s)`:""} • separador: <code>${sep==="\t"?"TAB":sep}</code></div>
    <div class="paste-tblwrap"><table class="tbl paste-tbl"><thead><tr>${colsShow.map(c=>`<th>${c}</th>`).join("")}</tr></thead><tbody>
    ${amostra.map(r=>`<tr>${colsShow.map(c=>`<td${c==="valor"?' class="num"':""}>${c==="valor"?fmt(r[c]):(r[c]||"—")}</td>`).join("")}</tr>`).join("")}
    </tbody></table></div>
    ${registros.length>amostra.length?`<div class="paste-more">…e mais ${registros.length-amostra.length} registro(s). Pré-visualização limitada a ${amostra.length}.</div>`:""}`;
  // aplica
  const modo=(document.querySelector('input[name="paste-mode"]:checked')||{}).value||"substituir";
  if(modo==="acrescentar") DR.fato=DR.fato.concat(registros);
  else DR.fato=registros;
  normalizarFato();
  salvar();              // persiste no localStorage
  popularFiltros();      // recalcula opções de filtro
  renderChips();
  toast(`${registros.length} registro(s) ${modo==="acrescentar"?"acrescentado(s)":"importado(s)"} com sucesso`,"✅");
  // mantém o usuário na aba e mostra contagem atualizada
  renderEditFato();
  switchEditTab("fato");
  // re-cola o texto e o resultado para o usuário conferir
  document.getElementById("paste-area").value=txt;
  document.getElementById("paste-preview").innerHTML=prev.innerHTML;
}
function msgErro(html){return `<div class="paste-err">❌ ${html}</div>`;}
function editFato(i,campo,val){DR.fato[i][campo]=(campo==="ano")?parseInt(val)||0:(campo==="valor")?parseFloat(String(val).replace(/\./g,"").replace(",","."))||0:val;}
function addLinhaFato(){DR.fato.unshift({ano:new Date().getFullYear(),mes:"Jan",cia:"",motivo:"",setor:"",status:"Em aberto",valor:0});renderEditFato();switchEditTab("fato");}
function delLinhaFato(i){DR.fato.splice(i,1);renderEditFato();switchEditTab("fato");}
function renderEditAcoes(){
  const STt=["Pendente","Em andamento","Concluído"];
  document.getElementById("etab-acoes").innerHTML=`
    <button class="btn btn-primary" style="margin-bottom:13px" onclick="addAcao()">+ Nova ação</button>
    <div class="edit-cards">
    ${DR.acoes.map((a,i)=>`
      <div class="edit-card">
        <div class="ec-field" style="margin-bottom:9px"><label>Descrição da ação</label><input value="${(a.desc||"").replace(/"/g,"&quot;")}" onchange="editAcao(${i},'desc',this.value)"></div>
        <div class="ec-grid">
          <div class="ec-field ec-wide"><label>Responsável</label><input value="${(a.resp||"").replace(/"/g,"&quot;")}" onchange="editAcao(${i},'resp',this.value)"></div>
          <div class="ec-field"><label>Prazo</label><input type="date" value="${a.prazo||""}" onchange="editAcao(${i},'prazo',this.value)"></div>
          <div class="ec-field"><label>Status</label><select onchange="editAcao(${i},'status',this.value)">${STt.map(s=>`<option ${s===a.status?"selected":""}>${s}</option>`).join("")}</select></div>
          <button class="ec-del" onclick="delAcao(${i})" title="Remover">🗑</button>
        </div>
      </div>`).join("")}
    </div>`;
}
function editAcao(i,campo,val){DR.acoes[i][campo]=val;}
function addAcao(){DR.acoes.push({desc:"Nova ação",resp:"",prazo:"",status:"Pendente"});renderEditAcoes();switchEditTab("acoes");}
function delAcao(i){DR.acoes.splice(i,1);renderEditAcoes();switchEditTab("acoes");}
function renderEditGeral(){
  document.getElementById("etab-geral").innerHTML=`
    <div class="edit-card" style="max-width:420px">
      <div class="ec-field" style="margin-bottom:11px"><label>Mês de referência</label><input value="${DR.refMes||""}" onchange="DR.refMes=this.value;document.getElementById('tb-refmes').textContent=this.value"></div>
      <div class="ec-field"><label>Crédito total (R$)</label><input type="number" step="0.01" value="${DR.creditoTotal||0}" onchange="DR.creditoTotal=parseFloat(this.value)||0"></div>
    </div>`;
}
function salvarConfig(){salvar();popularFiltros();toast("Dados salvos","💾");}
function restaurarPadrao(){if(confirm("Restaurar todos os dados para o padrão? Isso apaga suas edições.")){DR=clone(DADOS_PADRAO);salvar();popularFiltros();renderConfig();toast("Dados restaurados","↺");}}
 
/* NAVEGAÇÃO — menu lateral agrupado */
const SECOES=[
  {grp:"Análise"},
  {id:"gerencial", nome:"Inadimplência Gerencial", ic:"📊", sub:"Visão consolidada", restrito:false},
  {id:"devolucoes",nome:"Devoluções & Logística", ic:"🚚", sub:"Devoluções e coletas", restrito:false},
  {id:"credito",   nome:"Créditos & Conciliação", ic:"💳", sub:"Créditos por CIA",   restrito:false},
  {grp:"Operação"},
  {id:"boletim",   nome:"Gerar Boletim",          ic:"📄", sub:"Relatório executivo",restrito:false},
  {id:"exportar",  nome:"Exportar Excel",         ic:"📥", sub:"Download de dados",   restrito:false},
  {id:"acoes",     nome:"Plano de Ação",          ic:"✅", sub:"Acompanhamento",      restrito:false},
  {grp:"Sistema"},
  {id:"config",    nome:"Configurações (Edição)", ic:"⚙️", sub:"Editar dados",        restrito:true},
];
let VIEW_ATUAL="gerencial";
 
function montarMenu(){
  const nav=document.getElementById("sb-nav");
  nav.innerHTML=SECOES.map(s=>{
    if(s.grp) return `<div class="sb-sec-label">${s.grp}</div>`;
    return `<button class="sb-item ${s.restrito?'locked':''} ${s.id===VIEW_ATUAL?'active':''}" data-id="${s.id}" onclick="navegar('${s.id}')">
      <span class="ic">${s.ic}</span><span class="tx">${s.nome}</span>${s.restrito?'<span class="lock">🔒</span>':''}</button>`;
  }).join("");
}
function navegar(id){
  const sec=SECOES.find(s=>s.id===id);
  if(sec.restrito && !estaAutenticado()){ pendingView=id; abrirLogin(); return; }
  VIEW_ATUAL=id;
  document.querySelectorAll(".sb-item").forEach(b=>b.classList.toggle("active",b.dataset.id===id));
  document.getElementById("tb-title").textContent=sec.nome;
  document.getElementById("tb-sub").textContent=sec.sub;
  const usaFiltro=["gerencial","devolucoes","credito"].includes(id);
  document.getElementById("filterbar").style.display=usaFiltro?"flex":"none";
  renderAtual();
}
function renderAtual(){
  const map={gerencial:renderGerencial,devolucoes:renderDevolucoes,credito:renderCredito,
             boletim:renderBoletim,exportar:renderExportar,acoes:renderAcoes,config:renderConfig};
  (map[VIEW_ATUAL]||(()=>{}))();
}
 
/* SIDEBAR hover-expand — recolhida por padrão, expande ao passar o mouse.
   A expansão/recolhimento é via CSS (:hover). Aqui apenas reajustamos os
   gráficos quando a transição termina, para não distorcerem. */
function ligarHoverSidebar(){
  const sb=document.getElementById("sidebar");
  if(!sb)return;
  const reajustar=()=>setTimeout(()=>{Object.values(CHARTS).forEach(c=>c&&c.resize&&c.resize());},320);
  sb.addEventListener("mouseenter",reajustar);
  sb.addEventListener("mouseleave",reajustar);
}
 
/* AUTENTICAÇÃO */
let pendingView=null;
function estaAutenticado(){return sessionStorage.getItem("auth_ok")==="1";}
function abrirLogin(){
  document.getElementById("modal-login").classList.add("on");
  document.getElementById("login-err").style.display="none";
  document.getElementById("login-user").value="";
  document.getElementById("login-pass").value="";
  setTimeout(()=>document.getElementById("login-user").focus(),80);
}
function fecharLogin(){document.getElementById("modal-login").classList.remove("on");pendingView=null;}
function fazerLogin(){
  const u=document.getElementById("login-user").value.trim();
  const p=document.getElementById("login-pass").value;
  if(u===CREDENCIAIS.usuario && p===CREDENCIAIS.senha){
    sessionStorage.setItem("auth_ok","1");
    const destino=pendingView;
    fecharLogin();atualizarLock();
    toast("Acesso liberado","🔓");
    if(destino) navegar(destino); else renderAtual();
  }else{
    document.getElementById("login-err").style.display="block";
  }
}
function toggleLock(){
  if(estaAutenticado()){
    sessionStorage.removeItem("auth_ok");atualizarLock();
    toast("Sessão de edição encerrada","🔒");
    if(SECOES.find(s=>s.id===VIEW_ATUAL)?.restrito) navegar("gerencial");
  }else abrirLogin();
}
function atualizarLock(){
  const on=estaAutenticado();
  document.getElementById("tb-lock-ic").textContent=on?"🔒":"🔓";
  document.getElementById("tb-lock-tx").textContent=on?"Sair (edição)":"Entrar (edição)";
}
function ligarListenersLogin(){
  document.getElementById("btn-login-entrar").addEventListener("click",fazerLogin);
  ["login-user","login-pass"].forEach(id=>{
    document.getElementById(id).addEventListener("keydown",e=>{if(e.key==="Enter")fazerLogin();});
  });
  document.addEventListener("keydown",e=>{if(e.key==="Escape")fecharLogin();});
  document.getElementById("modal-login").addEventListener("click",e=>{if(e.target.id==="modal-login")fecharLogin();});
  document.addEventListener("click",e=>{if(!e.target.closest(".ms-dd"))document.querySelectorAll(".ms-dd.open").forEach(d=>d.classList.remove("open"));});
}
 
/* TOAST */
let toastT;
function toast(msg,ic="✓"){
  const t=document.getElementById("toast");
  document.getElementById("toast-ic").textContent=ic;
  document.getElementById("toast-tx").textContent=msg;
  t.classList.add("on");clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove("on"),2600);
}
 
/* BOOT */
function normalizarFato(){
  DR.fato.forEach(r=>{
    if(r.motivo==="Cobrar cia") r.motivo="Cobrar CIA";
    if(r.motivo==="Boleto Oficina") r.setor="Logística";
  });
}
document.addEventListener("DOMContentLoaded",()=>{
  normalizarFato();
  document.getElementById("tb-refmes").textContent=DR.refMes||"—";
  const li=document.getElementById("sb-logo-img"); if(li) li.src=LOGO_AUTOGLASS;
  montarMenu();
  popularFiltros();
  ligarListenersLogin();
  ligarHoverSidebar();
  atualizarLock();
  navegar("gerencial");
});
</script>
