<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Inadimplência — Autoglass</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --marinho:#070D2E; --marinho2:#0D1442; --azul:#0A64FF; --azul2:#2B4BFF;
  --violeta:#2021D4; --ceu:#73C6FF; --gelo:#EAF1FF;
  --verde:#10B981; --ambar:#F59E0B; --vermelho:#EF4444;
  --bg:#F4F6FB; --card:#FFFFFF; --borda:#E5E9F2; --cinza:#6B7280; --cinza2:#9AA4B8;
  --rsm:9px; --rmd:14px; --rlg:20px;
  --sh:0 1px 3px rgba(16,24,64,.06),0 6px 24px rgba(16,24,64,.05);
  --sh2:0 10px 40px rgba(16,24,64,.12);
  --sidebar-w:248px; --sidebar-wc:68px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;font-size:13px;line-height:1.55;background:var(--bg);color:var(--marinho);font-weight:400;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4,.font-d{font-family:'Sora',sans-serif}
button{font-family:inherit}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:#cdd5e6;border-radius:6px}
::-webkit-scrollbar-track{background:transparent}

/* ===================== LAYOUT SHELL ===================== */
.shell{display:flex;min-height:100vh}

/* ---------- SIDEBAR recolhível ---------- */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:linear-gradient(180deg,var(--marinho),var(--marinho2));
  color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;
  transition:width .28s cubic-bezier(.4,0,.2,1),min-width .28s cubic-bezier(.4,0,.2,1);
  z-index:50;overflow:hidden;
}
.sidebar.collapsed{width:var(--sidebar-wc);min-width:var(--sidebar-wc)}
.sb-head{display:flex;align-items:center;gap:11px;padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.08);min-height:64px}
.sb-logo{width:46px;height:auto;min-width:46px;display:flex;align-items:center;justify-content:center}
.sidebar.collapsed .sb-logo{width:40px;min-width:40px}
.sb-brand{overflow:hidden;white-space:nowrap;transition:opacity .2s}
.sb-brand .t{font-family:'Sora';font-weight:700;font-size:14px;letter-spacing:.2px}
.sb-brand .s{font-size:10.5px;color:var(--ceu);font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.sidebar.collapsed .sb-brand{opacity:0;width:0}

.sb-nav{flex:1;padding:14px 12px;overflow-y:auto;overflow-x:hidden}
.sb-sec-label{font-size:9.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.32);padding:14px 12px 7px;white-space:nowrap}
.sidebar.collapsed .sb-sec-label{opacity:0;height:8px;padding:4px 0}
.sb-item{display:flex;align-items:center;gap:12px;width:100%;background:transparent;border:none;color:rgba(255,255,255,.72);
  padding:10px 12px;border-radius:10px;cursor:pointer;font-size:12.5px;font-weight:500;transition:.16s;margin-bottom:2px;white-space:nowrap;position:relative}
.sb-item .ic{width:20px;min-width:20px;text-align:center;font-size:15px}
.sb-item .tx{overflow:hidden;transition:opacity .2s}
.sidebar.collapsed .sb-item .tx{opacity:0;width:0}
.sb-item:hover{background:rgba(255,255,255,.08);color:#fff}
.sb-item.active{background:linear-gradient(135deg,var(--azul),var(--violeta));color:#fff;box-shadow:0 4px 16px rgba(10,100,255,.4)}
.sb-item.locked .lock{font-size:10px;opacity:.6;margin-left:auto}
.sidebar.collapsed .sb-item.locked .lock{display:none}
.sb-foot{padding:12px;border-top:1px solid rgba(255,255,255,.08)}
.sb-toggle{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:rgba(255,255,255,.06);border:none;color:rgba(255,255,255,.7);padding:9px;border-radius:9px;cursor:pointer;font-size:12px;font-weight:500;transition:.16s}
.sb-toggle:hover{background:rgba(255,255,255,.12);color:#fff}

/* ---------- MAIN ---------- */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--card);border-bottom:1px solid var(--borda);padding:0 24px;min-height:62px;display:flex;align-items:center;gap:18px;position:sticky;top:0;z-index:40}
.tb-title{font-family:'Sora';font-weight:700;font-size:16px;color:var(--marinho)}
.tb-sub{font-size:11px;color:var(--cinza2);font-weight:500}
.tb-spacer{flex:1}
.tb-status{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--cinza);background:var(--gelo);padding:6px 12px;border-radius:50px;font-weight:500}
.tb-dot{width:7px;height:7px;border-radius:50%;background:var(--verde)}
.tb-lock{background:var(--marinho);color:#fff;border:none;padding:8px 15px;border-radius:9px;cursor:pointer;font-size:12px;font-weight:600;display:flex;align-items:center;gap:7px;transition:.16s}
.tb-lock:hover{background:var(--azul)}

/* ---------- FILTROS GLOBAIS ---------- */
.filterbar{background:var(--card);border-bottom:1px solid var(--borda);padding:13px 24px;display:flex;align-items:flex-end;gap:13px;flex-wrap:wrap;position:sticky;top:62px;z-index:38}
.fb-group{display:flex;flex-direction:column;gap:4px}
.fb-group label{font-size:9.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--cinza2)}
.fb-group select{border:1.5px solid var(--borda);border-radius:9px;padding:8px 11px;font-family:inherit;font-size:12.5px;font-weight:500;color:var(--marinho);background:#fff;outline:none;cursor:pointer;min-width:128px;transition:.16s}
.fb-group select:hover{border-color:var(--ceu)}
.fb-group select:focus{border-color:var(--azul);box-shadow:0 0 0 3px rgba(10,100,255,.12)}
/* ---- multiselect dropdown ---- */
.ms-dd{position:relative}
.ms-btn{display:flex;align-items:center;justify-content:space-between;gap:8px;min-width:148px;border:1.5px solid var(--borda);border-radius:9px;padding:8px 11px;background:#fff;font-family:inherit;font-size:12.5px;font-weight:500;color:var(--marinho);cursor:pointer;transition:.16s;width:100%}
.ms-btn:hover{border-color:var(--ceu)}
.ms-btn.ms-active{border-color:var(--azul);background:var(--gelo);color:var(--azul)}
.ms-caret{font-size:10px;color:var(--cinza2)}
.ms-menu{position:absolute;top:calc(100% + 5px);left:0;min-width:100%;width:max-content;max-width:260px;max-height:280px;overflow-y:auto;background:#fff;border:1px solid var(--borda);border-radius:11px;box-shadow:var(--sh2);padding:6px;z-index:60;display:none}
.ms-dd.open .ms-menu{display:block;animation:fade .15s ease}
.ms-opt{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;font-size:12.5px;font-weight:500;color:var(--marinho);cursor:pointer;white-space:nowrap;transition:.12s}
.ms-opt:hover{background:var(--gelo)}
.ms-opt input{width:15px;height:15px;accent-color:var(--azul);cursor:pointer;flex-shrink:0}
.ms-opt.ms-all{border-bottom:1px solid var(--borda);border-radius:0;margin-bottom:4px;padding-bottom:9px;font-weight:600;color:var(--cinza)}
.fb-icon{width:38px;height:38px;border-radius:9px;background:linear-gradient(135deg,var(--marinho),var(--violeta));display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;margin-right:3px}
.fb-clear{margin-left:auto;align-self:center;background:#fff;border:1.5px solid var(--borda);color:var(--cinza);padding:8px 15px;border-radius:9px;cursor:pointer;font-size:12px;font-weight:600;transition:.16s;display:flex;align-items:center;gap:6px}
.fb-clear:hover{border-color:var(--vermelho);color:var(--vermelho)}
.fb-active{display:flex;gap:7px;flex-wrap:wrap;width:100%;margin-top:2px}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--gelo);color:var(--azul);border:1px solid #cfe0ff;padding:4px 10px;border-radius:50px;font-size:11px;font-weight:600}
.chip button{background:none;border:none;color:var(--azul);cursor:pointer;font-size:13px;line-height:1;padding:0;opacity:.6}
.chip button:hover{opacity:1}

/* ---------- CONTENT ---------- */
.content{padding:22px 24px 40px;flex:1}
.view{display:none;animation:fade .3s ease}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ---------- KPI CARDS ---------- */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--borda);border-radius:var(--rmd);padding:16px 18px;box-shadow:var(--sh);position:relative;overflow:hidden;transition:.2s}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.kpi::after{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--azul)}
.kpi.dk::after{background:var(--marinho)} .kpi.am::after{background:var(--ambar)} .kpi.gr::after{background:var(--verde)} .kpi.rd::after{background:var(--vermelho)} .kpi.vi::after{background:var(--violeta)}
.kpi .kl{font-size:10.5px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--cinza2);margin-bottom:7px;display:flex;align-items:center;gap:6px}
.kpi .kv{font-family:'Sora';font-size:22px;font-weight:700;color:var(--marinho);letter-spacing:-.5px}
.kpi .ksub{font-size:10.5px;color:var(--cinza);margin-top:3px;font-weight:500}

/* ---------- PANELS / CHART CARDS ---------- */
.grid{display:grid;gap:14px;margin-bottom:14px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:2fr 1fr}
.g13{grid-template-columns:1fr 2fr}
@media(max-width:1080px){.g2,.g3,.g13{grid-template-columns:1fr}}
.panel{background:var(--card);border:1px solid var(--borda);border-radius:var(--rmd);padding:17px 18px;box-shadow:var(--sh)}
.panel-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.panel-h h3{font-size:13px;font-weight:700;color:var(--marinho);display:flex;align-items:center;gap:8px}
.panel-h .hint{font-size:10.5px;color:var(--cinza2);font-weight:500}
.panel-h .bar{width:4px;height:16px;border-radius:3px;background:var(--azul)}
.chart-box{position:relative;height:260px}
.chart-box.sm{height:210px}
.chart-box.lg{height:320px}

/* ---------- TABELAS ---------- */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;font-size:9.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--cinza2);padding:9px 10px;border-bottom:2px solid var(--borda)}
.tbl td{padding:9px 10px;border-bottom:1px solid #F0F2F8;color:var(--marinho)}
.tbl tr:hover td{background:var(--gelo)}
.tbl .num{text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
.tag{display:inline-block;padding:2px 9px;border-radius:50px;font-size:10.5px;font-weight:600}
.tag.ab{background:#FEF3C7;color:#B45309} .tag.an{background:#DBEAFE;color:#1D4ED8}
.tag.pe{background:#FEE2E2;color:#B91C1C} .tag.ok{background:#D1FAE5;color:#047857}
.mini-bar{height:7px;border-radius:4px;background:var(--gelo);overflow:hidden}
.mini-bar>div{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--azul),var(--ceu))}

/* ---------- EMPTY ---------- */
.empty{text-align:center;padding:46px 20px;color:var(--cinza2)}
.empty .ic{font-size:34px;opacity:.4;margin-bottom:10px}

/* ---------- BTNs ---------- */
.btn{border:none;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;padding:9px 16px;display:inline-flex;align-items:center;gap:7px;transition:.16s}
.btn-primary{background:linear-gradient(135deg,var(--azul),var(--violeta));color:#fff;box-shadow:0 4px 14px rgba(10,100,255,.32)}
.btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn-ghost{background:#fff;border:1.5px solid var(--borda);color:var(--marinho)}
.btn-ghost:hover{border-color:var(--azul);color:var(--azul)}
.btn-dk{background:var(--marinho);color:#fff} .btn-dk:hover{background:var(--azul)}

/* ---------- MODAL ---------- */
.overlay{position:fixed;inset:0;background:rgba(7,13,46,.55);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:9000;padding:20px}
.overlay.on{display:flex;animation:fade .2s}
.modal{background:#fff;border-radius:var(--rlg);width:100%;max-width:420px;box-shadow:var(--sh2);overflow:hidden}
.modal.lg{max-width:1000px}
.modal-h{background:linear-gradient(135deg,var(--marinho),var(--violeta));color:#fff;padding:18px 22px;display:flex;align-items:center;justify-content:space-between}
.modal-h h2{font-size:15px;font-weight:700}
.modal-h .x{background:rgba(255,255,255,.15);border:none;color:#fff;width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:15px}
.modal-h .x:hover{background:rgba(255,255,255,.3)}
.modal-b{padding:22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--cinza);margin-bottom:5px}
.field input,.field select{width:100%;border:1.5px solid var(--borda);border-radius:9px;padding:10px 12px;font-family:inherit;font-size:13px;color:var(--marinho);outline:none;transition:.16s}
.field input:focus,.field select:focus{border-color:var(--azul);box-shadow:0 0 0 3px rgba(10,100,255,.12)}
.login-hint{background:var(--gelo);border-radius:9px;padding:10px 12px;font-size:11.5px;color:var(--azul);margin-bottom:14px;display:flex;gap:8px;align-items:center}
.login-err{display:none;background:#FEE2E2;color:#B91C1C;padding:9px 12px;border-radius:9px;font-size:12px;font-weight:500;margin-bottom:12px}

/* login-gate (telas restritas) */
.gate{text-align:center;padding:60px 20px}
.gate .ic{font-size:46px;margin-bottom:14px}
.gate h3{font-size:17px;margin-bottom:7px}
.gate p{color:var(--cinza);margin-bottom:18px;font-size:13px}

.section-title{font-family:'Sora';font-size:18px;font-weight:700;margin-bottom:3px}
.section-sub{font-size:12px;color:var(--cinza2);margin-bottom:18px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--marinho);color:#fff;padding:12px 22px;border-radius:50px;font-size:13px;font-weight:600;box-shadow:var(--sh2);z-index:9999;opacity:0;transition:.3s;display:flex;align-items:center;gap:9px}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1}

/* ============================================================ BOLETIM (modelo executivo) */
:root{--suave:#F1F5FF;--claro:#73C6FF;--amber:#F59E0B;--white:#fff;--r:14px;--sombra:0 1px 3px rgba(16,24,64,.06),0 6px 24px rgba(16,24,64,.05)}
#bol-wrap{max-width:1040px;margin:0 auto;padding:0 0 40px}
.b-pdfbtn{display:flex;justify-content:flex-end;margin-bottom:14px}
.b-hdr{background:linear-gradient(135deg,var(--marinho) 0%,#0C1460 55%,var(--violeta) 100%);color:#fff;padding:38px 44px;border-radius:18px;margin-bottom:30px;position:relative;overflow:hidden;page-break-inside:avoid}
.b-hdr::before{content:'';position:absolute;top:-50px;right:-50px;width:260px;height:260px;background:radial-gradient(circle,rgba(115,198,255,.14) 0%,transparent 70%);border-radius:50%}
.bh-meta{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;flex-wrap:wrap;position:relative;z-index:1}
.bh-badge{background:rgba(115,198,255,.18);border:1px solid rgba(115,198,255,.35);color:var(--claro);font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:4px 11px;border-radius:50px;display:inline-block;margin-bottom:11px}
.b-hdr h1{font-family:'Sora';font-size:clamp(20px,3vw,30px);font-weight:700;line-height:1.15;margin-bottom:7px}
.b-hdr p{font-size:13px;color:rgba(255,255,255,.65);font-weight:400;max-width:440px}
.bh-logo{position:relative;z-index:1;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.bh-data{text-align:right;font-size:11px;color:rgba(255,255,255,.5)}
.bh-data strong{display:block;font-size:15px;font-weight:600;color:var(--claro);margin:3px 0 1px}
.b-sec{margin-bottom:32px;page-break-inside:avoid}
.b-stitle{font-family:'Sora';font-size:10px;font-weight:700;letter-spacing:2.6px;text-transform:uppercase;color:var(--azul);margin-bottom:12px;display:flex;align-items:center;gap:9px}
.b-stitle::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--borda),transparent)}
.b-analise{background:var(--suave);border-left:4px solid var(--azul);border-radius:0 9px 9px 0;padding:14px 18px;font-size:12.5px;color:#2D3748;line-height:1.7;margin-bottom:12px}
.b-analise strong{color:var(--marinho);font-weight:700}
.b-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:11px}
.b-card{background:#fff;border-radius:var(--r);padding:15px 14px;box-shadow:var(--sombra);border:1px solid var(--borda);position:relative;overflow:hidden}
.b-card.dk{background:linear-gradient(135deg,var(--marinho),#0C1460);border-color:transparent}
.b-card.dk .bcl{color:rgba(255,255,255,.55)}.b-card.dk .bcv{color:var(--claro)}
.b-card.gr{border-left:4px solid var(--verde)}.b-card.am{border-left:4px solid var(--amber)}.b-card.rd{border-left:4px solid var(--vermelho)}.b-card.vi{border-left:4px solid var(--violeta)}
.b-card .bcl{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--cinza);margin-bottom:5px}
.b-card .bcv{font-family:'Sora';font-size:clamp(14px,1.8vw,19px);font-weight:700;color:var(--marinho);line-height:1.1}
.b-card .bcicon{position:absolute;top:11px;right:11px;width:26px;height:26px;border-radius:7px;background:rgba(10,100,255,.07);display:flex;align-items:center;justify-content:center;font-size:13px}
.b-cg{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:13px}
.b-cc{background:#fff;border-radius:var(--r);padding:17px 16px;box-shadow:var(--sombra);border:1px solid var(--borda);overflow:hidden}
.b-cc.full{grid-column:1/-1}
.bct{font-family:'Sora';font-size:12.5px;font-weight:600;margin-bottom:3px}
.bcd{font-size:10px;color:var(--cinza);margin-bottom:12px}
.bcw{position:relative;height:215px;width:100%}
.b-cias-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.b-cias-box{background:#fff;border-radius:var(--r);padding:17px 16px;box-shadow:var(--sombra);border:1px solid var(--borda)}
.cia-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--suave)}
.cia-row:last-child{border-bottom:none}
.cia-rk{font-size:10px;font-weight:700;color:var(--azul);width:18px}
.cia-nm{flex:1;font-weight:500;font-size:11.5px}
.cia-bw{width:54px}.cia-b{height:5px;background:var(--suave);border-radius:3px;overflow:hidden}
.cia-bf{height:100%;background:linear-gradient(to right,var(--azul),var(--claro));border-radius:3px}
.cia-vl{font-weight:700;font-size:11px;color:var(--marinho);white-space:nowrap}
.b-acao-item{background:#fff;border-radius:9px;padding:12px 15px;box-shadow:0 2px 8px rgba(5,10,52,.07);border:1px solid var(--borda);margin-bottom:9px}
.b-acao-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;gap:10px}
.b-acao-title{font-weight:600;font-size:13px}
.b-acao-meta{font-size:11px;color:var(--cinza)}
.b-passos{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:9px}
.b-passo{background:#fff;border-radius:9px;padding:12px 14px;box-shadow:0 2px 8px rgba(5,10,52,.07);border:1px solid var(--borda);display:flex;align-items:flex-start;gap:10px;font-size:12px;color:#374151;line-height:1.5}
.b-pn{width:23px;height:23px;border-radius:6px;background:linear-gradient(135deg,var(--azul),var(--violeta));color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.analise-gerencial{background:linear-gradient(135deg,#F8FAFF,var(--suave));border:1px solid var(--borda);border-radius:var(--r);padding:20px}
.ag-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}
.ag-item{background:#fff;border-radius:9px;padding:13px 15px;border:1px solid var(--borda)}
.ag-item-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--azul);margin-bottom:5px}
.ag-item-txt{font-size:12px;color:#374151;line-height:1.55}
.ag-item-txt strong{color:var(--marinho);font-weight:700}
.b-footer{background:var(--marinho);color:rgba(255,255,255,.45);text-align:center;padding:16px;border-radius:var(--r);margin-top:24px;font-size:11px}
.b-footer strong{color:var(--claro);font-weight:600}
.avoid{page-break-inside:avoid!important;break-inside:avoid!important}

/* ============================================================ EDIÇÃO (dinâmica) */
.edit-tabs{display:flex;gap:7px;margin-bottom:14px;border-bottom:2px solid var(--borda);padding-bottom:0}
.edit-tab{background:transparent;border:none;color:var(--cinza);padding:9px 16px;cursor:pointer;font-size:12.5px;font-weight:600;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.16s;border-radius:9px 9px 0 0}
.edit-tab:hover{background:var(--gelo);color:var(--azul)}
.edit-tab.active{color:var(--azul);border-bottom-color:var(--azul);background:var(--gelo)}
.edit-actionbar{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--borda);border-radius:12px;padding:11px 16px;margin-bottom:14px;box-shadow:var(--sh)}
.edit-counter{font-size:12px;font-weight:600;color:var(--cinza)}
.edit-cards{display:flex;flex-direction:column;gap:10px;max-height:560px;overflow-y:auto;padding:2px}
.edit-card{background:var(--card);border:1px solid var(--borda);border-radius:13px;padding:13px 15px;box-shadow:var(--sh);transition:.16s}
.edit-card:hover{border-color:var(--ceu);box-shadow:var(--sh2)}
.ec-grid{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap}
.ec-field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:90px}
.ec-field.ec-wide{flex:2;min-width:150px}
.ec-field label{font-size:9.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--cinza2)}
.ec-field input,.ec-field select{border:1.5px solid var(--borda);border-radius:9px;padding:8px 11px;font-family:inherit;font-size:12.5px;font-weight:500;color:var(--marinho);background:#fff;outline:none;transition:.16s;width:100%}
.ec-field input:focus,.ec-field select:focus{border-color:var(--azul);box-shadow:0 0 0 3px rgba(10,100,255,.12)}
.ec-del{background:#FEF2F2;border:1.5px solid #FECACA;color:var(--vermelho);width:38px;height:38px;border-radius:9px;cursor:pointer;font-size:14px;flex-shrink:0;transition:.16s}
.ec-del:hover{background:var(--vermelho);color:#fff;border-color:var(--vermelho)}
</style>
</head>

const LS_KEY="sis_inadimplencia_v3";

/* ============================================================

============================================================ */
const fmt=v=>"R$ "+Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtM=v=>{v=Number(v)||0;if(Math.abs(v)>=1e6)return"R$ "+(v/1e6).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})+" mi";if(Math.abs(v)>=1e3)return"R$ "+(v/1e3).toLocaleString("pt-BR",{minimumFractionDigits:1,maximumFractionDigits:1})+" mil";return fmt(v);};
const fmtP=v=>Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})+"%";
const fmtN=v=>Number(v||0).toLocaleString("pt-BR");
const COR=["#0A64FF","#2021D4","#2B4BFF","#73C6FF","#1E40AF","#60A5FA","#93C5FD","#0D1442","#1D4ED8","#BFDBFE"];
const CHARTS={};
function mkChart(id,cfg){if(CHARTS[id]){CHARTS[id].destroy();delete CHARTS[id];}const el=document.getElementById(id);if(!el)return;CHARTS[id]=new Chart(el,cfg);return CHARTS[id];}
if(window.Chart){Chart.defaults.font.family="'Inter',sans-serif";Chart.defaults.color="#6B7280";Chart.defaults.font.size=11;}

/* ============================================================
   MOTOR DE FILTROS GLOBAIS — multisseleção
   Cada filtro é um array; vazio = "todos".
============================================================ */
const FILTROS={ano:[],mes:[],cia:[],motivo:[],status:[]};
const FILTRO_LABELS={ano:"Ano",mes:"Mês",cia:"CIA",motivo:"Motivo",status:"Status"};

function aplicarFato(){
  return DR.fato.filter(r=>
    (!FILTROS.ano.length    || FILTROS.ano.includes(String(r.ano))) &&
    (!FILTROS.mes.length    || FILTROS.mes.includes(r.mes)) &&
    (!FILTROS.cia.length    || FILTROS.cia.includes(r.cia)) &&
    (!FILTROS.motivo.length || FILTROS.motivo.includes(r.motivo)) &&
    (!FILTROS.status.length || FILTROS.status.includes(r.status))
  );
}
function agrupar(rows,campo){
  const m={};rows.forEach(r=>{m[r[campo]]=(m[r[campo]]||0)+r.valor;});
  return Object.entries(m).filter(([,v])=>v!==0).sort((a,b)=>b[1]-a[1]);
}

/* ---- opções disponíveis por campo ---- */
function opcoesDe(campo){
  if(campo==="ano") return [...new Set(DR.fato.map(r=>String(r.ano)))].sort((a,b)=>b-a);
  if(campo==="mes") return MESES.filter(m=>DR.fato.some(r=>r.mes===m)).concat(DR.fato.some(r=>r.mes==="—")?["—"]:[]);
  return [...new Set(DR.fato.map(r=>r[campo]))].filter(Boolean).sort();
}

/* ---- monta os dropdowns multiselect ---- */
function popularFiltros(){
  ["ano","mes","cia","motivo","status"].forEach(campo=>{
    // limpa seleções que não existem mais
    FILTROS[campo]=FILTROS[campo].filter(v=>opcoesDe(campo).includes(v));
    montarDropdown(campo);
  });
}
function montarDropdown(campo){
  const opts=opcoesDe(campo);
  const sel=FILTROS[campo];
  const menu=document.getElementById("ms-menu-"+campo);
  if(menu){
    menu.innerHTML=
      `<label class="ms-opt ms-all"><input type="checkbox" ${sel.length===0?"checked":""} onchange="msToggleAll('${campo}')"> <span>Todos</span></label>`+
      opts.map(o=>`<label class="ms-opt"><input type="checkbox" value="${o}" ${sel.includes(o)?"checked":""} onchange="msToggle('${campo}','${String(o).replace(/'/g,"\\'")}')"> <span>${o}</span></label>`).join("");
  }
  atualizarBotaoFiltro(campo);
}
function atualizarBotaoFiltro(campo){
  const btn=document.getElementById("ms-btn-"+campo);if(!btn)return;
  const sel=FILTROS[campo];
  const padrao={ano:"Todos os anos",mes:"Todos os meses",cia:"Todas as CIAs",motivo:"Todos os motivos",status:"Todos os status"}[campo];
  let txt;
  if(sel.length===0) txt=padrao;
  else if(sel.length===1) txt=sel[0];
  else txt=sel.length+" selecionados";
  btn.querySelector(".ms-btn-txt").textContent=txt;
  btn.classList.toggle("ms-active",sel.length>0);
}
function msToggle(campo,valor){
  const i=FILTROS[campo].indexOf(valor);
  if(i>=0) FILTROS[campo].splice(i,1); else FILTROS[campo].push(valor);
  montarDropdown(campo);renderChips();renderAtual();
}
function msToggleAll(campo){
  FILTROS[campo]=[];           // "Todos" = limpar seleção
  montarDropdown(campo);renderChips();renderAtual();
}
function msOpen(campo,btn){
  const dd=document.getElementById("ms-"+campo);
  const aberto=dd.classList.contains("open");
  document.querySelectorAll(".ms-dd.open").forEach(d=>d.classList.remove("open"));
  if(!aberto) dd.classList.add("open");
}
function setFiltro(campo,valor){   // usado por clique nos gráficos (toggle单)
  valor=String(valor);
  const i=FILTROS[campo].indexOf(valor);
  if(i>=0) FILTROS[campo].splice(i,1); else FILTROS[campo].push(valor);
  montarDropdown(campo);renderChips();renderAtual();
}
function limparFiltros(){
  Object.keys(FILTROS).forEach(k=>FILTROS[k]=[]);
  popularFiltros();renderChips();renderAtual();
}
function renderChips(){
  const box=document.getElementById("fb-active");
  const chips=[];
  Object.entries(FILTROS).forEach(([campo,vals])=>{
    vals.forEach(v=>chips.push(`<span class="chip">${FILTRO_LABELS[campo]}: ${v}<button onclick="setFiltro('${campo}','${String(v).replace(/'/g,"\\'")}')">✕</button></span>`));
  });
  box.innerHTML=chips.join("");
}

============================================================ */
function kpi(l,v,sub,cls){return `<div class="kpi ${cls||''}"><div class="kl">${l}</div><div class="kv">${v}</div>${sub?`<div class="ksub">${sub}</div>`:''}</div>`;}
function panelOpen(titulo,hint,cls){return `<div class="panel"><div class="panel-h"><h3><span class="bar"></span>${titulo}</h3>${hint?`<span class="hint">${hint}</span>`:''}</div><div class="${cls||''}">`;}
function panelClose(){return `</div></div>`;}
function vazio(msg){return `<div class="empty"><div class="ic">🔍</div>${msg||'Sem dados para os filtros selecionados.'}</div>`;}

function renderGerencial(){
  const rows=aplicarFato();

  // cauda = anos anteriores ao mais recente; nova = ano mais recente
  const anoMax=Math.max(...DR.fato.map(r=>r.ano));
  const cauda=rows.filter(r=>r.ano<anoMax).reduce((s,r)=>s+r.valor,0);

  let html=`<div class="kpi-row">
    ${kpi("Valor Total",fmtM(total),(rows.length+" registros"),"dk")}
    ${kpi("Cauda Histórica",fmtM(cauda),"Safras anteriores","")}
    ${kpi("Inadimplência Nova",fmtM(nova),"Safra "+anoMax,"rd")}
    ${kpi("Crédito",fmtM(credito),"Boleto Oficina","am")}
    ${kpi("Em Devolução",fmtM(devolucao),"Logística","vi")}
  </div>`;

  if(!rows.length){document.getElementById("content").innerHTML=`<div class="view on">${html}${vazio()}</div>`;return;}

  html+=`<div class="grid g2">
    ${panelOpen("Valor por CIA","clique p/ filtrar","chart-box")}<canvas id="c-cia"></canvas>${panelClose()}
    ${panelOpen("Valor por Motivo","clique p/ filtrar","chart-box")}<canvas id="c-motivo"></canvas>${panelClose()}
  </div>

    ${panelOpen("Valor por Ano","","chart-box")}<canvas id="c-ano"></canvas>${panelClose()}
    ${panelOpen("Valor por Setor","","chart-box")}<canvas id="c-setor"></canvas>${panelClose()}
  </div>
  <div class="grid">
    ${panelOpen("Histórico anual — Faturamento × Inadimplência","série completa 2018–2026","chart-box lg")}<canvas id="c-hist"></canvas>${panelClose()}
  </div>`;
  document.getElementById("content").innerHTML=`<div class="view on">${html}</div>`;

  const byCia=agrupar(rows,"cia"),byMot=agrupar(rows,"motivo"),byAno=agrupar(rows,"ano"),bySet=agrupar(rows,"setor");
  const barOpts=(onClickArr,campo)=>({indexAxis:"y",responsive:true,maintainAspectRatio:false,
    onClick:(e,el)=>{if(el.length)setFiltro(campo,onClickArr[el[0].index][0]);},
    plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${fmt(c.raw)} (${fmtP(total?c.raw/total*100:0)})`}}},
    scales:{x:{ticks:{callback:v=>fmtM(v)},grid:{color:"rgba(0,0,0,.04)"}},y:{grid:{display:false}}}});

  mkChart("c-cia",{type:"bar",data:{labels:byCia.map(x=>x[0]),datasets:[{data:byCia.map(x=>x[1]),backgroundColor:byCia.map((_,i)=>COR[i%COR.length]),borderRadius:5}]},options:barOpts(byCia,"cia")});

  mkChart("c-ano",{type:"bar",data:{labels:byAno.map(x=>x[0]).sort(),datasets:[{data:byAno.sort((a,b)=>a[0]-b[0]).map(x=>x[1]),backgroundColor:byAno.map((_,i)=>i>=byAno.length-2?"#0A64FF":"rgba(10,100,255,.32)"),borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,onClick:(e,el)=>{if(el.length)setFiltro("ano",byAno.sort((a,b)=>a[0]-b[0])[el[0].index][0]);},plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmt(c.raw)}}},scales:{x:{grid:{display:false}},y:{ticks:{callback:v=>fmtM(v)},grid:{color:"rgba(0,0,0,.04)"}}}}});
  mkChart("c-setor",{type:"doughnut",data:{labels:bySet.map(x=>x[0]),datasets:[{data:bySet.map(x=>x[1]),backgroundColor:COR,borderWidth:2,borderColor:"#fff"}]},options:{responsive:true,maintainAspectRatio:false,cutout:"58%",plugins:{legend:{position:"bottom",labels:{font:{size:10},padding:8,boxWidth:10}},tooltip:{callbacks:{label:c=>`${c.label}: ${fmt(c.raw)} (${fmtP(total?c.raw/total*100:0)})`}}}}});

  const h=DR.historico;

  mkChart("b-gSetor",{type:"doughnut",data:{labels:bySet.map(x=>x[0]),datasets:[{data:bySet.map(x=>x[1]),backgroundColor:COR,borderWidth:2,borderColor:"#fff"}]},options:{responsive:true,maintainAspectRatio:false,cutout:"56%",plugins:{legend:{position:"bottom",labels:{font:{size:9.5},padding:7,boxWidth:9}},tooltip:{callbacks:{label:c=>`${c.label}: ${fmt(c.raw)}`}}}}});
  const top=byCia.slice(0,10), maxC=top[0]?.[1]||1;
  document.getElementById("b-cias-lista").innerHTML=top.map((c,i)=>`<div class="cia-row"><span class="cia-rk">#${i+1}</span><span class="cia-nm">${c[0]}</span><div class="cia-bw"><div class="cia-b"><div class="cia-bf" style="width:${(c[1]/maxC*100).toFixed(0)}%"></div></div></div><span class="cia-vl">${fmtM(c[1])}</span></div>`).join("");
  mkChart("b-gCias",{type:"bar",data:{labels:top.map(x=>x[0]),datasets:[{data:top.map(x=>x[1]),backgroundColor:top.map((_,i)=>COR[i%COR.length]),borderRadius:4}]},options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${fmt(c.raw)} (${fmtP(total?c.raw/total*100:0)})`}}},scales:{x:{ticks:{callback:v=>fmtM(v)},grid:{color:"rgba(0,0,0,.04)"}},y:{grid:{display:false}}}}});
  mkChart("b-gEfic",{type:"line",data:{labels:col.semanas.map(s=>s.sem),datasets:[{data:col.semanas.map(s=>s.efic),borderColor:"#0A64FF",backgroundColor:"rgba(10,100,255,.12)",fill:true,tension:.35,pointRadius:4,borderWidth:2.5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:100,ticks:{callback:v=>v+"%"},grid:{color:"rgba(0,0,0,.04)"}},x:{grid:{display:false}}}}});
  mkChart("b-gCalda",{type:"bar",data:{labels:col.caldaPorMes.map(c=>c.mes),datasets:[{data:col.caldaPorMes.map(c=>c.qtd),backgroundColor:col.caldaPorMes.map((_,i)=>COR[i%COR.length]),borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmtN(c.raw)+" ("+col.caldaPorMes[c.dataIndex].perc+"%)"}}},scales:{x:{grid:{display:false}},y:{grid:{color:"rgba(0,0,0,.04)"}}}}});
  const h=DR.historico;
  mkChart("b-gHist",{data:{labels:h.map(x=>x.ano),datasets:[
    {type:"bar",label:"Faturamento",data:h.map(x=>x.faturamento),backgroundColor:"rgba(10,100,255,.22)",borderRadius:5,yAxisID:"y"},
    {type:"line",label:"% Inadimplência",data:h.map(x=>x.perc),borderColor:"#EF4444",backgroundColor:"#EF4444",borderWidth:2.5,tension:.35,yAxisID:"y2",pointRadius:3}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{boxWidth:12,padding:12}},tooltip:{callbacks:{label:c=>c.dataset.yAxisID==="y2"?`${c.dataset.label}: ${fmtP(c.raw)}`:`${c.dataset.label}: ${fmtM(c.raw)}`}}},scales:{y:{ticks:{callback:v=>fmtM(v)},grid:{color:"rgba(0,0,0,.04)"}},y2:{position:"right",ticks:{callback:v=>v+"%"},grid:{display:false}},x:{grid:{display:false}}}}});
}

/* ============================================================
   VIEW 5 — EXPORTAR EXCEL
============================================================ */
function renderExportar(){
  document.getElementById("content").innerHTML=`<div class="view on">
    <div class="section-title">Exportar Excel</div>
    <div class="section-sub">Baixe os dados agregados em planilha (.xlsx). Respeita os filtros globais aplicados.</div>
    <div class="grid g2">
      ${panelOpen("Tabela-fato (detalhe agregado)","")}<p style="color:var(--cinza);margin-bottom:14px">Exporta todas as linhas da base agregada com as dimensões Ano, Mês, CIA, Motivo, Setor e Status.</p><button class="btn btn-primary" onclick="exportarFato()">📥 Exportar tabela-fato</button>${panelClose()}
      ${panelOpen("Resumos por dimensão","")}<p style="color:var(--cinza);margin-bottom:14px">Gera uma planilha com abas separadas: por CIA, por Motivo, por Ano e por Setor.</p><button class="btn btn-dk" onclick="exportarResumos()">📊 Exportar resumos</button>${panelClose()}
    </div>
  </div>`;
}
function exportarFato(){
  if(!window.XLSX){toast("Biblioteca Excel indisponível offline","⚠️");return;}
  const rows=aplicarFato();
  const ws=XLSX.utils.json_to_sheet(rows.map(r=>({Ano:r.ano,Mês:r.mes,CIA:r.cia,Motivo:r.motivo,Setor:r.setor,Status:r.status,Valor:r.valor})));
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Tabela-fato");
  XLSX.writeFile(wb,"inadimplencia-fato.xlsx");toast("Excel exportado","✓");
}
function exportarResumos(){
  if(!window.XLSX){toast("Biblioteca Excel indisponível offline","⚠️");return;}
  const rows=aplicarFato();const wb=XLSX.utils.book_new();
  [["CIA","cia"],["Motivo","motivo"],["Ano","ano"],["Setor","setor"]].forEach(([nome,campo])=>{
    const g=agrupar(rows,campo).map(([k,v])=>({[nome]:k,Valor:v}));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(g),nome);
  });
  XLSX.writeFile(wb,"inadimplencia-resumos.xlsx");toast("Excel exportado","✓");
}

/* ============================================================
   VIEW 7 — CONFIGURAÇÕES (EDIÇÃO) — restrita
============================================================ */
function renderConfig(){
  if(!estaAutenticado()){document.getElementById("content").innerHTML=`<div class="view on"><div class="gate"><div class="ic">🔒</div><h3>Área restrita</h3><p>Faça login para editar os dados do sistema.</p><button class="btn btn-primary" onclick="abrirLogin()">Fazer login</button></div></div>`;return;}
  let html=`<div class="view on">
    <div class="section-title">Configurações — Edição de dados</div>
    <div class="section-sub">Edite a tabela-fato e o plano de ações. As alterações são salvas localmente no navegador.</div>
    <div class="edit-tabs">
      <button class="edit-tab active" data-tab="fato" onclick="switchEditTab('fato')">📊 Tabela-fato</button>
      <button class="edit-tab" data-tab="acoes" onclick="switchEditTab('acoes')">✅ Plano de Ações</button>
      <button class="edit-tab" data-tab="geral" onclick="switchEditTab('geral')">⚙️ Geral</button>
    </div>
    <div class="edit-actionbar">
      <div id="edit-counter" class="edit-counter"></div>
      <div style="display:flex;gap:9px">
        <button class="btn btn-ghost" onclick="restaurarPadrao()">↺ Restaurar padrão</button>
        <button class="btn btn-primary" onclick="salvarConfig()">💾 Salvar alterações</button>
      </div>
    </div>
    <div id="etab-fato" class="etab"></div>
    <div id="etab-acoes" class="etab" style="display:none"></div>
    <div id="etab-geral" class="etab" style="display:none"></div>
  </div>`;
  document.getElementById("content").innerHTML=html;
  renderEditFato(); renderEditAcoes(); renderEditGeral();
  switchEditTab(EDIT_TAB);
}
let EDIT_TAB="fato";
function switchEditTab(t){
  EDIT_TAB=t;
  document.querySelectorAll(".edit-tab").forEach(b=>b.classList.toggle("active",b.dataset.tab===t));
  ["fato","acoes","geral"].forEach(x=>{const el=document.getElementById("etab-"+x);if(el)el.style.display=(x===t)?"block":"none";});
  const cont={fato:DR.fato.length+" linhas na tabela-fato",acoes:DR.acoes.length+" ações cadastradas",geral:"Parâmetros gerais do sistema"};
  const c=document.getElementById("edit-counter"); if(c) c.textContent=cont[t]||"";
}
function renderEditFato(){
  const cias=[...new Set(DR.fato.map(r=>r.cia))].filter(Boolean).sort();
  const motivos=[...new Set(DR.fato.map(r=>r.motivo))].filter(Boolean).sort();
  const setores=[...new Set(DR.fato.map(r=>r.setor))].filter(Boolean).sort();
  const status=[...new Set(DR.fato.map(r=>r.status))].filter(Boolean).sort();
  const opt=(arr,v)=>`<option value="">—</option>`+arr.map(x=>`<option ${x===v?"selected":""}>${x}</option>`).join("")+((v&&!arr.includes(v))?`<option selected>${v}</option>`:"");
  document.getElementById("etab-fato").innerHTML=`
    <button class="btn btn-primary" style="margin-bottom:13px" onclick="addLinhaFato()">+ Nova linha</button>
    <div class="edit-cards">
    ${DR.fato.map((r,i)=>`
      <div class="edit-card">
        <div class="ec-grid">
          <div class="ec-field"><label>Ano</label><input type="number" value="${r.ano}" onchange="editFato(${i},'ano',this.value)"></div>
          <div class="ec-field"><label>Mês</label><select onchange="editFato(${i},'mes',this.value)">${["—"].concat(MESES).map(m=>`<option ${m===r.mes?"selected":""}>${m}</option>`).join("")}</select></div>
          <div class="ec-field ec-wide"><label>CIA</label><select onchange="editFato(${i},'cia',this.value)">${opt(cias,r.cia)}</select></div>
          <div class="ec-field ec-wide"><label>Motivo</label><select onchange="editFato(${i},'motivo',this.value)">${opt(motivos,r.motivo)}</select></div>
          <div class="ec-field"><label>Setor</label><select onchange="editFato(${i},'setor',this.value)">${opt(setores,r.setor)}</select></div>
          <div class="ec-field"><label>Status</label><select onchange="editFato(${i},'status',this.value)">${opt(status,r.status)}</select></div>
          <div class="ec-field"><label>Valor (R$)</label><input type="number" step="0.01" value="${r.valor}" onchange="editFato(${i},'valor',this.value)"></div>
          <button class="ec-del" onclick="delLinhaFato(${i})" title="Remover">🗑</button>
        </div>
      </div>`).join("")}
    </div>`;
}
function editFato(i,campo,val){DR.fato[i][campo]=(campo==="ano")?parseInt(val)||0:(campo==="valor")?parseFloat(String(val).replace(/\./g,"").replace(",","."))||0:val;}
function addLinhaFato(){DR.fato.unshift({ano:new Date().getFullYear(),mes:"Jan",cia:"",motivo:"",setor:"",status:"Em aberto",valor:0});renderEditFato();switchEditTab("fato");}
function delLinhaFato(i){DR.fato.splice(i,1);renderEditFato();switchEditTab("fato");}
function renderEditAcoes(){
  const STt=["Pendente","Em andamento","Concluído"];
  document.getElementById("etab-acoes").innerHTML=`
    <button class="btn btn-primary" style="margin-bottom:13px" onclick="addAcao()">+ Nova ação</button>
    <div class="edit-cards">
    ${DR.acoes.map((a,i)=>`
      <div class="edit-card">
        <div class="ec-field" style="margin-bottom:9px"><label>Descrição da ação</label><input value="${(a.desc||"").replace(/"/g,"&quot;")}" onchange="editAcao(${i},'desc',this.value)"></div>
        <div class="ec-grid">
          <div class="ec-field ec-wide"><label>Responsável</label><input value="${(a.resp||"").replace(/"/g,"&quot;")}" onchange="editAcao(${i},'resp',this.value)"></div>
          <div class="ec-field"><label>Prazo</label><input type="date" value="${a.prazo||""}" onchange="editAcao(${i},'prazo',this.value)"></div>
          <div class="ec-field"><label>Status</label><select onchange="editAcao(${i},'status',this.value)">${STt.map(s=>`<option ${s===a.status?"selected":""}>${s}</option>`).join("")}</select></div>
          <button class="ec-del" onclick="delAcao(${i})" title="Remover">🗑</button>
        </div>
      </div>`).join("")}
    </div>`;
}
function editAcao(i,campo,val){DR.acoes[i][campo]=val;}
function addAcao(){DR.acoes.push({desc:"Nova ação",resp:"",prazo:"",status:"Pendente"});renderEditAcoes();switchEditTab("acoes");}
function delAcao(i){DR.acoes.splice(i,1);renderEditAcoes();switchEditTab("acoes");}
function renderEditGeral(){
  document.getElementById("etab-geral").innerHTML=`
    <div class="edit-card" style="max-width:420px">
      <div class="ec-field" style="margin-bottom:11px"><label>Mês de referência</label><input value="${DR.refMes||""}" onchange="DR.refMes=this.value;document.getElementById('tb-refmes').textContent=this.value"></div>
      <div class="ec-field"><label>Crédito total (R$)</label><input type="number" step="0.01" value="${DR.creditoTotal||0}" onchange="DR.creditoTotal=parseFloat(this.value)||0"></div>
    </div>`;
}
function salvarConfig(){salvar();popularFiltros();toast("Dados salvos","💾");}
function restaurarPadrao(){if(confirm("Restaurar todos os dados para o padrão? Isso apaga suas edições.")){DR=clone(DADOS_PADRAO);salvar();popularFiltros();renderConfig();toast("Dados restaurados","↺");}}

/* ============================================================
   NAVEGAÇÃO — menu lateral agrupado
============================================================ */
const SECOES=[
  {grp:"Análise"},
  {id:"gerencial", nome:"Inadimplência Gerencial", ic:"📊", sub:"Visão consolidada", restrito:false},
  {id:"devolucoes",nome:"Devoluções & Logística", ic:"🚚", sub:"Devoluções e coletas", restrito:false},
  {id:"credito",   nome:"Créditos & Conciliação", ic:"💳", sub:"Créditos por CIA",   restrito:false},
  {grp:"Operação"},
  {id:"boletim",   nome:"Gerar Boletim",          ic:"📄", sub:"Relatório executivo",restrito:false},
  {id:"exportar",  nome:"Exportar Excel",         ic:"📥", sub:"Download de dados",   restrito:false},
  {id:"acoes",     nome:"Plano de Ação",          ic:"✅", sub:"Acompanhamento",      restrito:false},
  {grp:"Sistema"},
  {id:"config",    nome:"Configurações (Edição)", ic:"⚙️", sub:"Editar dados",        restrito:true},
];
let VIEW_ATUAL="gerencial";

function montarMenu(){
  const nav=document.getElementById("sb-nav");
  nav.innerHTML=SECOES.map(s=>{
    if(s.grp) return `<div class="sb-sec-label">${s.grp}</div>`;
    return `<button class="sb-item ${s.restrito?'locked':''} ${s.id===VIEW_ATUAL?'active':''}" data-id="${s.id}" onclick="navegar('${s.id}')">
      <span class="ic">${s.ic}</span><span class="tx">${s.nome}</span>${s.restrito?'<span class="lock">🔒</span>':''}</button>`;
  }).join("");
}
function navegar(id){
  const sec=SECOES.find(s=>s.id===id);
  if(sec.restrito && !estaAutenticado()){ pendingView=id; abrirLogin(); return; }
  VIEW_ATUAL=id;
  document.querySelectorAll(".sb-item").forEach(b=>b.classList.toggle("active",b.dataset.id===id));
  document.getElementById("tb-title").textContent=sec.nome;
  document.getElementById("tb-sub").textContent=sec.sub;
  const usaFiltro=["gerencial","devolucoes","credito"].includes(id);
  document.getElementById("filterbar").style.display=usaFiltro?"flex":"none";
  renderAtual();
}
function renderAtual(){
  const map={gerencial:renderGerencial,devolucoes:renderDevolucoes,credito:renderCredito,
             boletim:renderBoletim,exportar:renderExportar,acoes:renderAcoes,config:renderConfig};
  (map[VIEW_ATUAL]||(()=>{}))();
}

/* ============================================================
   AUTENTICAÇÃO
============================================================ */
let pendingView=null;
function estaAutenticado(){return sessionStorage.getItem("auth_ok")==="1";}
function abrirLogin(){
  document.getElementById("modal-login").classList.add("on");
  document.getElementById("login-err").style.display="none";
  document.getElementById("login-user").value="";
  document.getElementById("login-pass").value="";
  setTimeout(()=>document.getElementById("login-user").focus(),80);
}
function fecharLogin(){document.getElementById("modal-login").classList.remove("on");pendingView=null;}
function fazerLogin(){
  const u=document.getElementById("login-user").value.trim();
  const p=document.getElementById("login-pass").value;
  if(u===CREDENCIAIS.usuario && p===CREDENCIAIS.senha){
    sessionStorage.setItem("auth_ok","1");
    const destino=pendingView;            // captura antes de fechar (fecharLogin zera pendingView)
    fecharLogin();atualizarLock();
    toast("Acesso liberado","🔓");
    if(destino) navegar(destino); else renderAtual();
  }else{
    document.getElementById("login-err").style.display="block";
  }
}
function toggleLock(){
  if(estaAutenticado()){
    sessionStorage.removeItem("auth_ok");atualizarLock();
    toast("Sessão de edição encerrada","🔒");
    if(SECOES.find(s=>s.id===VIEW_ATUAL)?.restrito) navegar("gerencial");
  }else abrirLogin();
}
function atualizarLock(){
  const on=estaAutenticado();
  document.getElementById("tb-lock-ic").textContent=on?"🔒":"🔓";
  document.getElementById("tb-lock-tx").textContent=on?"Sair (edição)":"Entrar (edição)";
}
function ligarListenersLogin(){
  document.getElementById("btn-login-entrar").addEventListener("click",fazerLogin);
  ["login-user","login-pass"].forEach(id=>{
    document.getElementById(id).addEventListener("keydown",e=>{if(e.key==="Enter")fazerLogin();});
  });
  document.addEventListener("keydown",e=>{if(e.key==="Escape")fecharLogin();});
  document.getElementById("modal-login").addEventListener("click",e=>{if(e.target.id==="modal-login")fecharLogin();});
  // fecha dropdowns multiselect ao clicar fora
  document.addEventListener("click",e=>{if(!e.target.closest(".ms-dd"))document.querySelectorAll(".ms-dd.open").forEach(d=>d.classList.remove("open"));});
}

/* ============================================================
   TOAST
============================================================ */
let toastT;
function toast(msg,ic="✓"){
  const t=document.getElementById("toast");
  document.getElementById("toast-ic").textContent=ic;
  document.getElementById("toast-tx").textContent=msg;
  t.classList.add("on");clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove("on"),2600);
}

/* ============================================================
   BOOT
============================================================ */
document.addEventListener("DOMContentLoaded",()=>{
  document.getElementById("tb-refmes").textContent=DR.refMes||"—";
  const li=document.getElementById("sb-logo-img"); if(li) li.src=LOGO_AUTOGLASS;
  montarMenu();
  popularFiltros();
  ligarListenersLogin();
  atualizarLock();
  navegar("gerencial");
});
</script>
